name: Build and Secure GeoServer Ecosystem

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write # Required to upload scan results

    strategy:
      fail-fast: false # If one image fails security scans, don't cancel parallel tracks
      matrix:
        include:
          - image_identifier: geoserver-3
            image_name: jw141/geoserver
            dockerfile: Dockerfile
            prod_tag: 3.0-rockylinux9.7
          - image_identifier: geoserver-2-28
            image_name: jw141/geoserver
            dockerfile: Dockerfile.2_28
            prod_tag: 2.28.4--v2026.06.06

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =============================================================
      # Download step for the 3.0 track only
      # =============================================================
      - name: Download GeoServer Artifacts Natively via Curl
        if: matrix.image_identifier == 'geoserver-3'
        run: |
          echo "Fetching Core GeoServer Web Archive..."
          curl -L -s -o geoserver-3.0-RC-war.zip \
            "https://sourceforge.net/projects/geoserver/files/GeoServer/3.0-RC/geoserver-3.0-RC-war.zip/download"
          
          echo "Fetching Stable Core Extensions..."
          curl -L -s -o geoserver-3.0-RC-vectortiles-plugin.zip \
            "https://sourceforge.net/projects/geoserver/files/GeoServer/3.0-RC/extensions-RC/geoserver-3.0-RC-vectortiles-plugin.zip/download"
          curl -L -s -o geoserver-3.0-RC-control-flow-plugin.zip \
            "https://sourceforge.net/projects/geoserver/files/GeoServer/3.0-RC/extensions-RC/geoserver-3.0-RC-control-flow-plugin.zip/download"
          
          echo "Fetching Community/Raster Extensions from OSGeo Release Storage..."
          curl -L -s -o geoserver-3.0-SNAPSHOT-imagemosaic-jdbc-plugin.zip \
            "https://repo.osgeo.org/repository/release/org/geoserver/community/gs-imagemosaic-jdbc/3.0.0/gs-imagemosaic-jdbc-3.0.0.zip"
          curl -L -s -o geoserver-3.0-SNAPSHOT-cog-http-plugin.zip \
            "https://repo.osgeo.org/repository/release/org/geoserver/community/gs-cog/gs-cog-http/3.0.0/gs-cog-http-3.0.0.zip"
          curl -L -s -o geoserver-3.0-SNAPSHOT-cog-s3-plugin.zip \
            "https://repo.osgeo.org/repository/release/org/geoserver/community/gs-cog/gs-cog-s3/3.0.0/gs-cog-s3-3.0.0.zip"

      # =============================================================
      # Build step (Loads locally for scanning)
      # =============================================================
      - name: Build and Load Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true 
          tags: ${{ env.REGISTRY }}/${{ matrix.image_name }}:temp-${{ matrix.image_identifier }}

      # =============================================================
      # Vulnerability Scanning (Configured NOT to fail the build)
      # =============================================================
      - name: Run Trivy (Table output for logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.image_name }}:temp-${{ matrix.image_identifier }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # <--- Crucial: 0 ensures CRITICAL/HIGH bypass blocking

      - name: Run Trivy (SARIF for Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.image_name }}:temp-${{ matrix.image_identifier }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.image_identifier }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Uploads even if previous steps found issues
        with:
          sarif_file: 'trivy-results-${{ matrix.image_identifier }}.sarif'

      # =============================================================
      # Final Production Step: Push the verified image to GHCR
      # =============================================================
      - name: Build and Push Final Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.image_name }}:${{ matrix.prod_tag }}